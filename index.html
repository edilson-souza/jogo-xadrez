<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xadrez Online</title>
    <link rel="icon" type="image/png" href="imgs/icons8-cavalo-96.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-layout">
        <nav class="side-nav">
            <div class="logo"> XADREZ 🗿<span></span></div>
        </nav>

        <main class="game-area">
            <div class="player-info opponent">
                <div class="user-tag">
                    <img src="imgs/icons8-pawn-96.png" alt="Avatar">
                    <span id="opponentName">Adversário</span>
                </div>
                <div class="timer" id="timerOpponent">10:00</div>
            </div>

            <div id="boardContainer"></div>

            <div class="player-info user">
                <div class="user-tag">
                    <img src="imgs/icons8-spartan-helmet-96.png" alt="Avatar">
                    <span id="userName">Jogador</span>
                </div>
                <div class="timer active-timer" id="timerUser">10:00</div>
            </div>


            <div id="status" class="game-status">Escolha um modo para começar</div>
        </main>

        <aside class="mode-panel">
            <div class="panel-header">
            </div>

            <div class="mode-list">
                <div class="mode-card" id="btnOnline">
                    <div class="icon yellow"><i class="fa-solid fa-graduation-cap"></i></div>
                    <div class="text">
                        <h3>Jogue online</h3>
                        <p>Partida multiplayer via link</p>
                    </div>
                </div>

                <div class="mode-card" id="btnLocal">
                    <div class="icon brown"><i class="fa-solid fa-flag "></i></div>
                    <div class="text">
                        <h3>Jogar com um amigo</h3>
                        <p>Partida local no mesmo computador</p>
                    </div>
                </div>
            </div>

            <div id="multiplayerDetails" class="share-section" style="display: none;">
                <p>Link da Partida:</p>
                <input type="text" id="shareUrl" readonly>
                <button onclick="copyLink()" class="control-btn secondary">Copiar Link</button>
            </div>

            <div class="game-controls" id="gameControls" style="display: none;">
                <button id="btnResign" class="control-btn">
                    <i class="fa-solid fa-flag"></i> Desistir
                </button>
                <button id="btnNewGame" class="control-btn secondary">
                    <i class="fa-solid fa-plus"></i> Nova Partida
                </button>
            </div>
        </aside>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
    
    <script src="pawn-promotion.js"></script>
    <script src="chess-network.js"></script>
    <script src="game.js"></script>
</body>
</html>
